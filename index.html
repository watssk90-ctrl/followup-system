<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกการติดตาม - เจ้าหน้าที่ภาคสนาม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        // เปลี่ยน URL ตรงนี้เป็น Google Apps Script Web App URL ของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbxxc4x4xhSOqO2OJAeoBfkfJgYvbFEF0InWEzMmQpiJKDHwPnkjTHBeFFUnoXk64zvx/exec";
    </script>
</head>
<body class="bg-slate-50 text-slate-800 pb-12">

    <!-- Notification Modal -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
            <div id="modalIcon" class="text-4xl mb-4"></div>
            <h3 id="modalTitle" class="text-xl font-bold mb-2"></h3>
            <p id="modalMessage" class="text-slate-600 mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">ตกลง</button>
        </div>
    </div>

    <!-- Login Section -->
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h2>
                <p class="text-slate-500 text-sm mt-1">เจ้าหน้าที่ดูแลความเรียบร้อยระดับหมู่บ้าน</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">รหัสเจ้าหน้าที่</label>
                    <input type="text" id="username" placeholder="Officer ID" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">รหัสผ่าน (เบอร์โทรศัพท์)</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                <button id="loginBtn" onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all flex items-center justify-center">
                    <span>ลงชื่อเข้าใช้งาน</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="appSection" class="hidden">
        <!-- Header -->
        <nav class="bg-white border-b border-slate-100 p-4 sticky top-0 z-40 shadow-sm">
            <div class="max-w-lg mx-auto flex justify-between items-center">
                <div>
                    <h1 class="font-bold text-slate-800">บันทึกการติดตาม</h1>
                    <p id="officerArea" class="text-[10px] text-blue-600 font-medium uppercase tracking-wider">พื้นที่: กำลังโหลด...</p>
                </div>
                <button onclick="location.reload()" class="p-2 text-red-500 hover:bg-red-50 rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </nav>

        <div class="max-w-lg mx-auto p-4 space-y-6">
            <!-- Target Selection -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                    <span class="bg-blue-100 text-blue-600 p-1.5 rounded-lg mr-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a8.113 8.113 0 00-4.03-6.06 7.038 7.038 0 017.03 6.06 8.107 8.107 0 01-.07 1H12.93zM9 17a1 1 0 01-1-1 7 7 0 00-7-7 1 1 0 00-1 1c0 3.003 2.158 5.535 5 5.91V17h3z" />
                        </svg>
                    </span>
                    ข้อมูลผู้รับการติดตาม
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">รายชื่อในความรับผิดชอบ <span class="text-red-500">*</span></label>
                        <select id="recordId" class="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-xl font-bold text-slate-700 focus:outline-none focus:border-blue-400">
                            <option value="">กำลังโหลดข้อมูล...</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">รอบการติดตาม</label>
                            <select id="round" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                                <option>ครั้งที่ 1</option><option>ครั้งที่ 2</option>
                                <option>ครั้งที่ 3</option><option>ครั้งที่ 4</option>
                                <option>ครั้งที่ 5</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">วิธีการ</label>
                            <select id="method" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                                <option>ลงพื้นที่</option><option>โทรศัพท์</option>
                                <option>Video Call</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Health & Social Status -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                    <span class="bg-emerald-100 text-emerald-600 p-1.5 rounded-lg mr-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    สถานะปัจจุบัน
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">ผลการติดตามเบื้องต้น</label>
                        <input type="text" id="result" placeholder="เช่น พบตัว สภาพทั่วไปปกติ" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">สุขภาพกาย</label>
                            <select id="physical" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <option>ปกติ</option><option>เจ็บป่วย</option><option>ทรุดโทรม</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">สุขภาพจิต</label>
                            <select id="mental" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <option>ปกติ</option><option>ซึมเศร้า</option><option>ก้าวร้าว</option><option>วิตกกังวล</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">สัมพันธ์ครอบครัว</label>
                            <select id="familyRisk" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <option>ดี</option><option>ปานกลาง</option><option>มีปัญหา</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">สัมพันธ์ชุมชน</label>
                            <select id="communityRisk" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl">
                                <option>ดี</option><option>ปานกลาง</option><option>มีปัญหา</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Risk Evaluation -->
            <div class="bg-red-50 p-6 rounded-2xl shadow-sm border border-red-100">
                <h3 class="font-bold text-red-800 mb-4 flex items-center">
                    <span class="bg-red-100 text-red-600 p-1.5 rounded-lg mr-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    การประเมินความเสี่ยง
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-red-600 uppercase mb-1 block">คะแนน (0-10)</label>
                        <input type="number" id="riskScore" min="0" max="10" placeholder="0" class="w-full p-3 bg-white border border-red-200 rounded-xl focus:outline-none focus:ring-1 focus:ring-red-400">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-red-600 uppercase mb-1 block">ระดับเสี่ยง</label>
                        <select id="riskLevel" class="w-full p-3 bg-white border border-red-200 rounded-xl font-bold">
                            <option>ต่ำ</option><option>ปานกลาง</option><option>สูง</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4">
                    <label class="text-xs font-bold text-red-600 uppercase mb-1 block">หมายเหตุ / พฤติกรรมที่ควรเฝ้าระวัง</label>
                    <textarea id="note" rows="3" class="w-full p-3 bg-white border border-red-200 rounded-xl focus:outline-none" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
                </div>
            </div>

            <!-- Multimedia & GPS -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase mb-3 block">รูปถ่ายการลงพื้นที่</label>
                        <div id="imagePreviewContainer" class="hidden mb-4 relative group">
                            <img id="imagePreview" src="" class="w-full h-48 object-cover rounded-2xl shadow-inner border border-slate-200">
                            <button onclick="clearImage()" class="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                        <input type="file" id="imageInput" accept="image/*" capture="environment" onchange="handleImage(this)" class="hidden">
                        <button onclick="document.getElementById('imageInput').click()" class="w-full border-2 border-dashed border-slate-200 p-8 rounded-2xl flex flex-col items-center justify-center hover:bg-slate-50 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <span class="text-sm text-slate-500 font-medium">กดเพื่อถ่ายภาพหรือเลือกรูป</span>
                        </button>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <button onclick="getLocation()" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold flex items-center justify-center hover:bg-slate-900 transition mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                            </svg>
                            ดึงตำแหน่ง GPS ปัจจุบัน
                        </button>
                        <p id="gpsStatus" class="text-center text-[11px] font-mono text-slate-500">สถานะ: ยังไม่ได้ระบุตำแหน่ง</p>
                        <input type="hidden" id="lat"><input type="hidden" id="lng">
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button id="submitBtn" onclick="submitTracking(event)" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold text-lg shadow-xl shadow-blue-200 hover:scale-[1.02] active:scale-95 transition-all">
                บันทึกและส่งข้อมูล
            </button>
        </div>
    </div>

    <script>
        let currentUserName = "";
        let userTambon = "";
        let userMoo = "";
        let base64Image = "";

        // Modal Control
        function showModal(type, title, message) {
            const modal = document.getElementById('modal');
            const icon = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const msgEl = document.getElementById('modalMessage');

            icon.innerText = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            titleEl.innerText = title;
            msgEl.innerText = message;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!user || !pass) {
                showModal('error', 'ข้อมูลไม่ครบ', 'กรุณาระบุรหัสเจ้าหน้าที่และรหัสผ่าน');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white rounded-full mr-3"></div> กำลังตรวจสอบ...`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", username: user, password: pass })
                });
                const res = await response.json();

                if (res.status === 'success' && res.role === 'User') {
                    currentUserName = res.name;
                    userTambon = res.tambon;
                    userMoo = res.moo;
                    
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('appSection').classList.remove('hidden');
                    document.getElementById('officerArea').innerText = `หมู่ ${userMoo} ต.${userTambon} | ${currentUserName}`;
                    
                    loadTargetList();
                } else {
                    showModal('error', 'เข้าสู่ระบบไม่สำเร็จ', res.message || 'รหัสผ่านไม่ถูกต้อง');
                    btn.disabled = false;
                    btn.innerText = "ลงชื่อเข้าใช้งาน";
                }
            } catch (e) {
                showModal('error', 'เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                btn.disabled = false;
                btn.innerText = "ลงชื่อเข้าใช้งาน";
            }
        }

        async function loadTargetList() {
            const selectBox = document.getElementById('recordId');
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "get_target_list", tambon: userTambon, moo: userMoo })
                });
                const res = await response.json();

                if (res.status === 'success') {
                    selectBox.innerHTML = '<option value="">-- เลือกรายชื่อ --</option>';
                    res.data.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.id;
                        opt.textContent = `${p.id}: ${p.name}`;
                        selectBox.appendChild(opt);
                    });
                    if(res.data.length === 0) selectBox.innerHTML = '<option value="">❌ ไม่มีรายชื่อในพื้นที่นี้</option>';
                }
            } catch (e) {
                selectBox.innerHTML = '<option value="">❌ ไม่สามารถโหลดข้อมูลได้</option>';
            }
        }

        function getLocation() {
            const status = document.getElementById('gpsStatus');
            if (navigator.geolocation) {
                status.innerText = "⏳ กำลังดึงพิกัด...";
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('lat').value = pos.coords.latitude;
                    document.getElementById('lng').value = pos.coords.longitude;
                    status.innerText = `✅ พิกัดสำเร็จ: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                }, () => {
                    showModal('error', 'GPS ล้มเหลว', 'กรุณาเปิดบริการระบุตำแหน่งบนโทรศัพท์ของคุณ');
                    status.innerText = "❌ ระบุตำแหน่งล้มเหลว";
                }, { enableHighAccuracy: true });
            } else {
                showModal('error', 'ระบบไม่รองรับ', 'เบราว์เซอร์ของคุณไม่รองรับ GPS');
            }
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX = 1000;
                        let w = img.width, h = img.height;
                        if (w > h && w > MAX) { h *= MAX / w; w = MAX; } 
                        else if (h > MAX) { w *= MAX / h; h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        base64Image = canvas.toDataURL('image/jpeg', 0.8);
                        
                        document.getElementById('imagePreview').src = base64Image;
                        document.getElementById('imagePreviewContainer').classList.remove('hidden');
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage() {
            base64Image = "";
            document.getElementById('imageInput').value = "";
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        async function submitTracking(event) {
            const recordId = document.getElementById('recordId').value;
            const lat = document.getElementById('lat').value;
            const btn = document.getElementById('submitBtn');

            if (!recordId) return showModal('error', 'ข้อมูลไม่ครบ', 'กรุณาเลือกผู้รับการติดตาม');
            if (!lat) return showModal('error', 'GPS ไม่พร้อม', 'กรุณากดดึงพิกัด GPS ก่อนบันทึก');

            const originText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = `<div class="loader w-5 h-5 border-2 border-white rounded-full mr-3"></div> กำลังนำส่ง...`;

            const payload = {
                action: "save_tracking",
                recordId: recordId,
                round: document.getElementById('round').value,
                method: document.getElementById('method').value,
                result: document.getElementById('result').value,
                physical: document.getElementById('physical').value,
                mental: document.getElementById('mental').value,
                familyRisk: document.getElementById('familyRisk').value,
                communityRisk: document.getElementById('communityRisk').value,
                riskScore: document.getElementById('riskScore').value,
                riskLevel: document.getElementById('riskLevel').value,
                note: document.getElementById('note').value,
                latitude: lat,
                longitude: document.getElementById('lng').value,
                trackDate: new Date().toISOString().split('T')[0],
                officerName: currentUserName,
                imageB64: base64Image
            };

            try {
                const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const res = await response.json();
                
                if(res.status === 'success') {
                    showModal('success', 'บันทึกสำเร็จ', 'ข้อมูลถูกส่งเข้าสู่ระบบเรียบร้อยแล้ว');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showModal('error', 'ล้มเหลว', res.message || 'ไม่สามารถบันทึกข้อมูลได้');
                    btn.disabled = false;
                    btn.innerText = originText;
                }
            } catch (error) {
                showModal('error', 'ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้ในขณะนี้');
                btn.disabled = false;
                btn.innerText = originText;
            }
        }
    </script>
</body>
</html>
